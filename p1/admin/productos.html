<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <mi-menu-admin></mi-menu-admin>
       <div class="container admin-container mt-5 mb-5">
        <h2 class="mb-4">Gestión de Productos</h2>

        <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#modalAgregarProducto">
            <i class="fas fa-plus me-2"></i> Añadir Nuevo Producto
        </button>
        <form class="mb-3">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Buscar pedido por cliente..." name="buscar">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search"></i> Buscar
            </button>
        </div>
    </form>

        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>
                            <img src="img/venom.jpg" alt="Venom" class="img-thumbnail img-producto">
                        </td>
                        <td>Impresión Venom A3</td>
                        <td>35.00€</td>
                        <td>
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditarProducto">Editar</button>
                            <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modalEliminarProducto">Eliminar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>
                            <img src="img/spiderman.jpg" alt="Spider-Man" class="img-thumbnail img-producto">
                        </td>
                        <td>Impresión Spider-Man A4</td>
                        <td>20.00€</td>
                        <td>
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditarProducto">Editar</button>
                            <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modalEliminarProducto">Eliminar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>
                            <span class="text-muted">Sin imagen</span>
                        </td>
                        <td>Impresión Batman A3</td>
                        <td>40.00€</td>
                        <td>
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditarProducto">Editar</button>
                            <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modalEliminarProducto">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        </div>
<!-- Modales para agregar, editar y eliminar productos --> 
        <div class="modal fade" id="modalAgregarProducto" tabindex="-1" aria-labelledby="modalAgregarProductoLabel" aria-hidden="true" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title" id="modalAgregarProductoLabel">Añadir Nuevo Producto</h3>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label for="nombreProducto" class="form-label">Nombre del Producto</label>
                                <input type="text" class="form-control" id="nombreProducto" required>
                            </div>
                            <div class="mb-3">
                                <label for="precioProducto" class="form-label">Precio</label>
                                <input type="number" class="form-control" id="precioProducto" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="imagenProducto" class="form-label">URL de la Imagen</label>
                                <input type="url" class="form-control" id="imagenProducto" placeholder="Opcional">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary">Guardar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalEditarProducto" tabindex="-1" aria-labelledby="modalEditarProductoLabel" aria-hidden="true" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title" id="modalEditarProductoLabel">Editar Producto</h3>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label for="nombreProductoEditar" class="form-label">Nombre del Producto</label>
                                <input type="text" class="form-control" id="nombreProductoEditar" required>
                            </div>
                            <div class="mb-3">
                                <label for="precioProductoEditar" class="form-label">Precio</label>
                                <input type="number" class="form-control" id="precioProductoEditar" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="imagenProductoEditar" class="form-label">URL de la Imagen</label>
                                <input type="url" class="form-control" id="imagenProductoEditar" placeholder="Opcional">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalEliminarProducto" tabindex="-1" role="dialog" aria-labelledby="modalEliminarProductoLabel" aria-hidden="true">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-danger text-white">
                        <h3 class="modal-title fs-6" id="modalEliminarProductoLabel">
                            <i class="fas fa-trash-alt me-1"></i> ¡Eliminado!
                        </h3>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-center py-4">
                        <p class="mb-0">El producto se ha eliminado correctamente del catálogo.</p>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button type="button" class="btn btn-success" data-bs-dismiss="modal">Aceptar</button>
                    </div>
                </div>
            </div>
        </div>
        <mi-pie></mi-pie>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="js/mis-etiquetas.js"></script> 
</body>
</html>
