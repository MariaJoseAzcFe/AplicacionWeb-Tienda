<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <mi-menu-admin></mi-menu-admin>
       <div class="container admin-container mt-5 mb-5">
        <h2 class="mb-4">Gestión de Usuarios</h2>
        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Paula Jordán</td>
                        <td>Activo</td>
                        <td>
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditarUsuario">Editar</button>
                            <button class="btn btn-danger btn-sm">Desactivar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>María José Azcárate</td>
                        <td>Inactivo</td>
                        <td>
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditarUsuario">Editar</button>
                            <button class="btn btn-success btn-sm">Activar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Raul Peña</td>
                        <td>Activo</td>
                        <td>
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalEditarUsuario">Editar</button>
                            <button class="btn btn-danger btn-sm">Desactivar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        </div>

        <div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-labelledby="modalEditarUsuarioLabel" aria-hidden="true" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title" id="modalEditarUsuarioLabel">Editar Usuario</h3>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label for="nombreUsuarioEditar" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombreUsuarioEditar" required>
                            </div>
                            <div class="mb-3">
                                <label for="estadoUsuarioEditar" class="form-label">Estado</label>
                                <select class="form-control" id="estadoUsuarioEditar" required>
                                    <option value="">Seleccione una opción</option> 
                                    <option value="Activo">Activo</option>
                                    <option value="Inactivo">Inactivo</option>
                                </select>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </div>
            </div>
        </div>
        <mi-pie></mi-pie>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mis-etiquetas.js"></script> 
</body>
</html>
