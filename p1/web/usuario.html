<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <mi-menu></mi-menu>
    <div class="bubbles-container">
       <main class="container py-5">
            
            <div class="mb-5 w-100">
                <h2 class="titulos text-center mb-4">Mi perfil</h2>
                
                <div class="table-responsive bg-white rounded shadow-sm p-4">
                    <table class="table table-borderless mb-0">
                        <thead class="table-light border-bottom">
                            <tr>
                                <th colspan="2" class="text-center h5 py-3">Datos Personales</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">Nombre:</th>
                                <td>bla bla blaaaa</td>
                            </tr>
                            <tr>
                                <th scope="row">Correo:</th>
                                <td>usuario@gmail.com</td>
                            </tr>
                            <tr>
                                <th scope="row">Teléfono:</th>
                                <td>+34 600 000 000</td>
                            </tr>
                            <tr>
                                <th scope="row">Dirección:</th>
                                <td>Calle Falsisima 67, Valencia</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="w-100 mt-5">
                <h2 id="perfil" class="titulos text-center mb-5">Pedidos realizados</h2>
                
                <div class="row">
                    <div class="col-12 col-md-4 mb-4">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="./img/zenitsu.jpg" class="card-img-top" alt="Zenitsu" >
                            <div class="card-body text-center">
                                <h3 class="card-title h4 mt-2">Zenitsu</h3>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-12 col-md-4 mb-4">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="./img/zoro.jpg" class="card-img-top" alt="Zoro" >
                            <div class="card-body text-center">
                                <h3 class="card-title h4 mt-2">Zoro</h3>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-12 col-md-4 mb-4">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="./img/venom.jpg" class="card-img-top" alt="Venom" >
                            <div class="card-body text-center">
                                <h3 class="card-title h4 mt-2">Venom</h3>
                            </div>
                        </div>
                    </div>
                </div> </div>
            
        </main>
    </div>
    <mi-pie></mi-pie>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/mis-etiquetas.js"></script>
    <script src="https://kit.fontawesome.com/b94f3ebffd.js" crossorigin="anonymous"></script>
</body>
</html>
