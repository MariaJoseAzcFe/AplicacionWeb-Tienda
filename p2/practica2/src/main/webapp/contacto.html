<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="d-flex flex-column ">
    
    <mi-menu></mi-menu>
    <div class="bubbles-container">
    <div class=" container d-flex flex-column flex-grow-2 py-3">
        
        <h2 class="titulos">Contacto</h2>
        
        <div class="row flex-grow-1 w-100 m-0">
            
            <div class="col-12 col-md-6 mb-4 mb-md-0 d-flex flex-column">
                <div class="mapa-container flex-grow-1 d-flex flex-column">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3080.21866168959!2d-0.43602762460630823!3d39.4643886003394!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd604fc274f49c35%3A0x1ba5d728745f97f2!2sxirivella!5e0!3m2!1ses!2ses!4v1741486254523!5m2!1ses!2ses" class="flex-grow-1 w-100"  allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>

            <div class="col-12 col-md-6 d-flex flex-column">
                <div class="form-container flex-grow-1 d-flex flex-column">
                    <form class="d-flex flex-column h-100">
                        <div class="mb-3">
                            <label for="nombre" class="form-label ">Nombre</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Ingresa tu nombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="email" placeholder="Ingresa tu correo" required>
                        </div>
                        <div class="mb-3">
                            <label for="asunto" class="form-label">Asunto</label>
                            <input type="text" class="form-control" id="asunto" placeholder="Ingresa el asunto" required>
                        </div>
                        <div class="mb-3 flex-grow-1 d-flex flex-column">
                            <label for="mensaje" class="form-label ">Mensaje</label>
                            <textarea class="form-control flex-grow-1" id="mensaje" placeholder="Escribe tu mensaje" required></textarea>
                        </div>
                        <button type="button" class="btn text-black mt-auto" >Enviar</button>
                    </form>
                </div>
            </div>

        </div> 
    </div>
    </div>

    <mi-pie ></mi-pie>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/mis-etiquetas.js"></script>
    <script src="https://kit.fontawesome.com/b94f3ebffd.js" crossorigin="anonymous"></script>
</body>
</html>
