<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <mi-menu></mi-menu>
    <div class="bubbles-container">
        <div class="login-container">
            <h2 class="titulos">Registro</h2>
            <form action="RegistroServlet" method="POST">
                <input type="text" name="usuario" placeholder="Usuario" required><br>
                <input type="password" name="clave" placeholder="Contraseña" required><br>
                <input type="text" name="nombre" placeholder="Nombre" required><br>
                <input type="text" name="apellidos" placeholder="Apellidos" required><br>
                <input type="text" name="domicilio" placeholder="Domicilio" required><br>
                <input type="text" name="poblacion" placeholder="Población" required><br>
                <input type="text" name="provincia" placeholder="Provincia" required><br>
                <input type="text" name="cp" placeholder="Código Postal" required><br>
                <input type="text" name="telefono" placeholder="Teléfono" required><br>
                <input type="submit" value="Registrarse" class="btn bg-yellow text-black">
                <p class="text-center">¿Ya tienes una cuenta? <a href="loginUsuario.jsp">Inicia sesión</a>.</p>
            </form>
        </div>
    </div>
    <mi-pie></mi-pie>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/mis-etiquetas.js"></script>
    <script src="https://kit.fontawesome.com/b94f3ebffd.js" crossorigin="anonymous"></script>
</body>
</html>
